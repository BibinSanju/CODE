name: Weekly Problem Scraper

on:
  schedule:
    - cron: '0 0 * * 0' # Every Sunday at midnight UTC
  workflow_dispatch: # Allows manual trigger from GitHub Actions UI

jobs:
  scrape-and-seed:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: |
          cd scraper
          pip install -r requirements.txt

      - name: Run CSES Scraper (Downloads & Injects)
        run: |
          cd scraper
          python cses_scraper.py
        env:
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run LeetCode Scraper (Downloads JSON)
        run: |
          cd scraper
          python leetcode_scraper.py
          
      - name: Seed LeetCode Questions to Database
        run: |
          cd scraper
          python seed_supabase.py
        env:
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Fetch Company Tags Repository
        run: |
          cd scraper
          git clone https://github.com/liquidslr/leetcode-company-wise-problems.git
          
      - name: Run Company Tags Scraper (Generates JSON)
        run: |
          cd scraper
          python company_tags_scraper.py
          
      - name: Seed Company Tags to Database
        run: |
          cd scraper
          python seed_companies.py
        env:
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
